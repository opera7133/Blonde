<div class="{{ .Site.Params.base_color }} shadow-sm">
  <div class="container max-w-7xl mr-auto ml-auto">
    <nav class="flex items-center justify-between flex-wrap px-6 py-4">
      <div class="flex items-center flex-no-shrink text-white mr-6">
        <a href="{{ .Site.BaseURL }}"
          >{{ if .Site.Params.logo }}
            <img
              src="{{ .Site.Params.logo }}"
              alt="{{ .Site.Title }}"
              class="h-8 w-auto"
            />
          {{ else }}
            <span class="font-semibold text-xl tracking-tight"
              >{{ .Site.Title }}</span
            >
          {{ end }}</a
        >
      </div>
      <div class="flex md:hidden">
        <div class="py-2">
          <button
            onclick="toggleDarkMode()"
            class="focus-visible:outline-none mr-1 text-white/80 hover:text-white transition-colors duration-200 cursor-pointer"
            aria-label="Darkmode Toggle Button"
          >
            <span id="icon-moon"
              >{{ partial "icon.html" (dict "name" "bedtime" "class" "text-lg") }}</span
            >
            <span id="icon-sun" class="hidden"
              >{{ partial "icon.html" (dict "name" "sunny" "class" "text-lg") }}</span
            >
          </button>
          <span class="text-white">|</span>
        </div>
        <button
          id="hamburgerbtn"
          class="flex items-center px-3 py-2 text-white/80 hover:text-white transition-colors duration-200"
          aria-label="Hamburger Button"
        >
          {{ partial "icon.html" (dict "name" "menu" "class" "text-2xl") }}
        </button>
      </div>
      <div
        class="hidden w-full md:flex md:flex-row sm:items-center md:w-auto"
        id="mobileMenu"
      >
        <div class="text-sm lg:grow"></div>
        <div class="flex flex-col md:flex-row gap-2">
          {{ range .Site.Menus.main }}
            <a
              href="{{ .URL }}"
              class="no-underline font-medium text-sm block sm:inline-block sm:mt-0 text-white/80 hover:text-white mr-4 py-2 sm:py-0 transition-colors duration-200"
            >
              {{ .Name }}
            </a>
          {{ end }}
        </div>
        <div class="text-white hidden md:block">
          <span>|</span>
          <button
            onclick="toggleDarkMode()"
            class="focus-visible:outline-none hover:opacity-50 duration-200 ml-2 cursor-pointer"
            aria-label="Darkmode Toggle Button"
          >
            <span id="icon2-moon"
              >{{ partial "icon.html" (dict "name" "bedtime" "class" "text-lg") }}</span
            >
            <span id="icon2-sun" class="hidden"
              >{{ partial "icon.html" (dict "name" "sunny" "class" "text-lg") }}</span
            >
          </button>
        </div>
      </div>
    </nav>
  </div>
</div>
<style>
  .active {
    display: block;
  }
</style>

<script>
  let hamburger = document.getElementById("hamburgerbtn");

  let mobileMenu = document.getElementById("mobileMenu");

  hamburger.addEventListener("click", function () {
    mobileMenu.classList.toggle("active");
  });
</script>
