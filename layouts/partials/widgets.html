<div
  class="{{ if .Site.Params.widgets.mobile }}
    col-span-3 lg:col-span-1
  {{ else }}
    hidden lg:block lg:col-span-1
  {{ end }}"
>
  {{ $root := . }}
  {{ with (default .Site.Params.widgets.widgets .Params.widgets) -}}
    {{ range $widget := . }}
      {{ $p := printf "widgets/%s.html" $widget }}
      {{ partial $p $root }}
    {{ end }}
  {{ end }}
</div>
