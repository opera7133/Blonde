<!doctype html>
<html lang="{{ .Site.LanguageCode | default .Site.Language.Lang }}">
  {{- partial "head.html" . -}}
  <body class="font-sans">
    <div class="min-h-screen flex flex-col bg-gray-100 dark:bg-warmgray-800">
      {{- partial "header.html" . -}}
      <div
        class="container max-w-7xl mx-auto mt-4 grow px-5 lg:px-0"
        id="content"
      >
        <div class="lg:mx-5">{{- block "main" . }}{{- end }}</div>
      </div>
      {{- partial "footer.html" . -}}
    </div>
  </body>
</html>
